name: Release Schema

on:
  push:
    branches:
      - main
    paths:
      - "schema/**"
  workflow_dispatch:

concurrency:
  group: release-schema-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_SCHEMA_BUCKET_NAME }}
  R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com

jobs:
  validate:
    name: Validate Schemas
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        working-directory: schema

      - name: Validate schemas
        run: bun run validate.ts
        working-directory: schema

      - name: Detect version changes
        id: changed
        run: |
          set -euo pipefail

          CHANGED=""

          for f in schema/v*.json; do
            [ -f "$f" ] || continue
            key="$(basename "$f")"

            CURRENT=$(jq -r '.version // empty' "$f")
            if [ -z "$CURRENT" ]; then
              echo "::warning::$key has no version field — skipping"
              continue
            fi

            # Compare against what's currently deployed
            DEPLOYED=$(curl -sf "https://schema.sutures.dev/$key" | jq -r '.version // empty' 2>/dev/null || echo "")

            if [ -z "$DEPLOYED" ]; then
              echo "$key: not yet deployed — will upload ($CURRENT)"
              CHANGED="${CHANGED:+$CHANGED }$f"
            elif [ "$CURRENT" = "$DEPLOYED" ]; then
              echo "$key: unchanged ($CURRENT)"
            else
              # semver compare: deployed must not be ahead of local
              LOWER=$(printf '%s\n%s\n' "$DEPLOYED" "$CURRENT" | sort -V | head -n1)
              if [ "$LOWER" != "$DEPLOYED" ]; then
                echo "::error::$key: deployed version ($DEPLOYED) is ahead of local ($CURRENT) — refusing to downgrade"
                exit 1
              fi
              echo "$key: $DEPLOYED -> $CURRENT"
              CHANGED="${CHANGED:+$CHANGED }$f"
            fi
          done

          if [ -z "$CHANGED" ]; then
            echo "No schema version changes detected"
            echo "any=false" >> "$GITHUB_OUTPUT"
          else
            echo "any=true" >> "$GITHUB_OUTPUT"
            echo "files<<EOF" >> "$GITHUB_OUTPUT"
            echo "$CHANGED" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

    outputs:
      any: ${{ steps.changed.outputs.any }}
      files: ${{ steps.changed.outputs.files }}

  upload:
    name: Upload to R2
    needs: validate
    if: needs.validate.outputs.any == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Sync schemas to R2
        run: |
          set -euo pipefail
          S3_URL="s3://${{ env.R2_BUCKET }}"
          EP="--endpoint-url ${{ env.R2_ENDPOINT }} --region auto"

          echo "=== Current bucket contents ==="
          aws s3 ls "$S3_URL/" $EP || echo "(empty)"

          echo "=== Clearing bucket ==="
          aws s3 rm "$S3_URL/" $EP --recursive || echo "(nothing to delete)"

          echo "=== Uploading schemas ==="
          for f in schema/v*.json; do
            [ -f "$f" ] || continue
            key="$(basename "$f")"
            version=$(jq -r '.version' "$f")
            echo "Uploading $key (v$version)"
            aws s3 cp "$f" "$S3_URL/$key" $EP \
              --content-type "application/json" \
              --cache-control "public, max-age=300"
          done

          echo "=== Final bucket contents ==="
          aws s3 ls "$S3_URL/" $EP
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_KEY_ID }}
